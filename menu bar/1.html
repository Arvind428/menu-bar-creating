<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Galaxy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: cyan;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        video {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading">Initialising Hand Tracking...</div>
    <div id="ui-container">
        <h1>GALAXY SENSOR</h1>
        <p>Move your hand to guide the stars</p>
    </div>
    <video id="webcam" autoplay playsinline></video>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- GALAXY SETTINGS ---
        const GALAXY_PARAMS = {
            count: 15000,
            size: 0.02,
            radius: 5,
            branches: 3,
            spin: 1.5,
            randomness: 0.2,
            randomnessPower: 3,
            insideColor: '#ff6030',
            outsideColor: '#1b3984'
        };

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, galaxyPoints, handLandmarker;
        let video = document.getElementById('webcam');
        let targetX = 0, targetY = 0;
        let lastVideoTime = -1;

        async function init() {
            // 1. Setup Three.js Scene
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            createGalaxy();
            await setupTracking();
            
            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function createGalaxy() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(GALAXY_PARAMS.count * 3);
            const colors = new Float32Array(GALAXY_PARAMS.count * 3);

            const colorInside = new THREE.Color(GALAXY_PARAMS.insideColor);
            const colorOutside = new THREE.Color(GALAXY_PARAMS.outsideColor);

            for (let i = 0; i < GALAXY_PARAMS.count; i++) {
                const i3 = i * 3;

                // Position
                const radius = Math.random() * GALAXY_PARAMS.radius;
                const spinAngle = radius * GALAXY_PARAMS.spin;
                const branchAngle = (i % GALAXY_PARAMS.branches) / GALAXY_PARAMS.branches * Math.PI * 2;

                const randomX = Math.pow(Math.random(), GALAXY_PARAMS.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * GALAXY_PARAMS.randomness * radius;
                const randomY = Math.pow(Math.random(), GALAXY_PARAMS.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * GALAXY_PARAMS.randomness * radius;
                const randomZ = Math.pow(Math.random(), GALAXY_PARAMS.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * GALAXY_PARAMS.randomness * radius;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                // Color
                const mixedColor = colorInside.clone();
                mixedColor.lerp(colorOutside, radius / GALAXY_PARAMS.radius);
                
                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: GALAXY_PARAMS.size,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true
            });

            galaxyPoints = new THREE.Points(geometry, material);
            scene.add(galaxyPoints);
        }

        async function setupTracking() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            const constraints = { video: { width: 1280, height: 720 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        }

        function animate() {
            const time = performance.now() * 0.001;

            // Update Hand Tracking
            if (handLandmarker && video.readyState >= 2) {
                if (video.currentTime !== lastVideoTime) {
                    const result = handLandmarker.detectForVideo(video, performance.now());
                    if (result.landmarks && result.landmarks.length > 0) {
                        // We use the landmark at index 9 (Middle finger MCP) as the anchor
                        const hand = result.landmarks[0][9];
                        // Map 0-1 to Three.js coordinates
                        targetX = (0.5 - hand.x) * 12; // Inverted for mirror effect
                        targetY = (0.5 - hand.y) * 8;
                    }
                    lastVideoTime = video.currentTime;
                }
            }

            // Smooth movement (Lerp)
            if (galaxyPoints) {
                galaxyPoints.position.x += (targetX - galaxyPoints.position.x) * 0.05;
                galaxyPoints.position.y += (targetY - galaxyPoints.position.y) * 0.05;

                // Rotation
                galaxyPoints.rotation.y += 0.002;
                galaxyPoints.rotation.z += 0.001;
                
                // Slight "breathing" effect
                galaxyPoints.material.size = GALAXY_PARAMS.size * (1 + Math.sin(time) * 0.2);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
